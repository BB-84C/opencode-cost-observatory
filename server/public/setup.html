<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BB84 OpenCode Observatory Setup</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f6f8fa; color: #111827; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(460px, calc(100vw - 32px)); padding: 28px; border: 1px solid #d0d7de; border-radius: 14px; background: white; box-shadow: 0 18px 40px rgba(31, 35, 40, 0.08); }
      h1 { margin: 0 0 8px; font-size: 22px; }
      label, input, button { display: block; width: 100%; box-sizing: border-box; }
      label { margin: 18px 0 6px; font-weight: 700; }
      input { border: 1px solid #d0d7de; border-radius: 10px; padding: 11px 12px; }
      button { margin-top: 16px; border: 0; border-radius: 10px; padding: 12px 16px; background: #0969da; color: white; font-weight: 700; cursor: pointer; }
      p, #status { color: #57606a; line-height: 1.5; }
      #status { min-height: 20px; margin-top: 14px; font-size: 14px; }
    </style>
  </head>
  <body>
    <main>
      <h1>BB84 OpenCode Observatory</h1>
      <p>Register a passkey for the administrator account.</p>
      <label for="name">Passkey name</label>
      <input id="name" value="Primary device" maxlength="64" />
      <button id="register">Register passkey</button>
      <div id="status" role="status"></div>
    </main>
    <script src="https://unpkg.com/@simplewebauthn/browser@10/dist/bundle/index.min.js"></script>
    <script>
      const status = document.querySelector('#status')
      const params = new URLSearchParams(window.location.search)
      document.querySelector('#register').addEventListener('click', async () => {
        try {
          status.textContent = 'Starting passkey registration...'
          const bootstrap_token = params.get('bootstrap_token') || ''
          const begin = await fetch('/auth/passkey/register/begin', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ bootstrap_token, passkeyName: document.querySelector('#name').value })
          })
          if (!begin.ok) throw new Error('Unable to start registration')
          const { registrationOptions, challengeKey } = await begin.json()
          const registrationResponse = await SimpleWebAuthnBrowser.startRegistration(registrationOptions)
          const complete = await fetch('/auth/passkey/register/complete', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ challengeKey, registrationResponse })
          })
          if (!complete.ok) throw new Error('Passkey registration failed')
          window.location.href = '/'
        } catch (error) {
          status.textContent = error.message || 'Registration failed'
        }
      })
    </script>
  </body>
</html>
